spring.application.name=IntegraVidaBackend

spring.datasource.url=jdbc:aws-wrapper:postgresql://database-2-instance-1.cifwceq8iptd.us-east-1.rds.amazonaws.com:5432/integravida?sslmode=require&wrapperPlugins=iam
spring.datasource.driver-class-name=software.amazon.jdbc.Driver
spring.datasource.username=integravida_user

spring.jpa.database=postgresql
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=true
spring.jpa.properties.hibernate.format_sql=true

server.port=${PORT:8096}

security.jwt.secret=${JWT_SECRET:dev-only-change-this-secret-key-32-chars-minimum}
security.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

documentation.application.description=@project.description@
documentation.application.version=@project.version@